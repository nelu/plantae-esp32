<!doctype html><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1"><title>Plantae Device Configuration</title><style>body{font-family:sans-serif;max-width:440px;margin:24px auto;padding:0 12px}input,button{width:100%;padding:10px;margin:8px 0;font-size:16px;box-sizing:border-box}pre{background:#f6f6f6;padding:12px;white-space:pre-wrap;word-break:break-word;border-radius:8px}</style><h2>Configure Wi-Fi connection</h2><form id=f><input id=s placeholder=SSID autocomplete=off required><input id=p placeholder=Password type=password autocomplete=off minlength=8 required><button type=submit>Connect</button></form><pre id=o>Idle.</pre><script>const $=i=>document.getElementById(i);$("f").onsubmit=async e=>{e.preventDefault();$("o").textContent="Testing Wi-Fi in progress...";try{const r=await fetch("/provisioning",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({wifi:{ssid:$("s").value,password:$("p").value}})}),j=await r.json();$("o").textContent=JSON.stringify(j,null,2)+("\n\n"+(j&&j.ok?"Rebooting...":"Wi-Fi test failed; nothing saved."))}catch(err){$("o").textContent="Error: "+err}};</script>
